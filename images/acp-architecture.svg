<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="ACP AI Control Plane architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowMuted" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
    <style>
      .title { font: 700 28px system-ui, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 15px system-ui, sans-serif; fill: #cbd5e1; }
      .panel-title { font: 700 18px system-ui, sans-serif; fill: #f8fafc; }
      .panel-text { font: 500 14px system-ui, sans-serif; fill: #dbeafe; }
      .panel-sub { font: 400 12px system-ui, sans-serif; fill: #cbd5e1; }
      .chip { font: 600 13px system-ui, sans-serif; fill: #e2e8f0; }
      .small { font: 500 12px system-ui, sans-serif; fill: #cbd5e1; }
      .label { font: 700 12px system-ui, sans-serif; fill: #93c5fd; letter-spacing: 0.08em; text-transform: uppercase; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="24" fill="url(#bg)"/>

  <text x="60" y="64" class="title">ACP - AI Control Plane</text>
  <text x="60" y="92" class="subtitle">Deterministic governance layer between agent runtimes and execution targets.</text>

  <rect x="40" y="130" width="240" height="520" rx="20" fill="url(#panel)" stroke="#334155"/>
  <text x="68" y="172" class="label">Agent Side</text>
  <text x="68" y="202" class="panel-title">Agent runtimes and frameworks</text>

  <rect x="68" y="228" width="184" height="60" rx="14" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="160" y="252" text-anchor="middle" class="panel-text">CrewAI</text>
  <text x="160" y="272" text-anchor="middle" class="panel-sub">Tasks and tool orchestration</text>

  <rect x="68" y="304" width="184" height="60" rx="14" fill="#2563eb" filter="url(#shadow)"/>
  <text x="160" y="328" text-anchor="middle" class="panel-text">LangGraph / Strands</text>
  <text x="160" y="348" text-anchor="middle" class="panel-sub">Graphs, plans, workflows</text>

  <rect x="68" y="380" width="184" height="60" rx="14" fill="#3b82f6" filter="url(#shadow)"/>
  <text x="160" y="404" text-anchor="middle" class="panel-text">Google ADK / MCP clients</text>
  <text x="160" y="424" text-anchor="middle" class="panel-sub">Protocol-aware agent apps</text>

  <rect x="68" y="456" width="184" height="60" rx="14" fill="#60a5fa" filter="url(#shadow)"/>
  <text x="160" y="480" text-anchor="middle" class="panel-text">Custom Python workflows</text>
  <text x="160" y="500" text-anchor="middle" class="panel-sub">Your own app code</text>

  <text x="68" y="566" class="small">Agents keep reasoning and planning.</text>
  <text x="68" y="588" class="small">ACP governs the execution boundary.</text>

  <rect x="330" y="130" width="540" height="520" rx="24" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="360" y="172" class="label">Control Plane</text>
  <text x="360" y="202" class="panel-title">ACP runtime services</text>

  <rect x="360" y="228" width="220" height="72" rx="16" fill="#4f46e5" filter="url(#shadow)"/>
  <text x="470" y="255" text-anchor="middle" class="panel-text">ACP SDK / decorators</text>
  <text x="470" y="278" text-anchor="middle" class="panel-sub">@governed_tool, client, local wiring</text>

  <rect x="610" y="228" width="220" height="72" rx="16" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="720" y="255" text-anchor="middle" class="panel-text">Interceptor / Gateway</text>
  <text x="720" y="278" text-anchor="middle" class="panel-sub">PEP for tool, API, and agent calls</text>

  <rect x="360" y="330" width="150" height="78" rx="16" fill="#0f766e" filter="url(#shadow)"/>
  <text x="435" y="358" text-anchor="middle" class="panel-text">Identity / JWT</text>
  <text x="435" y="380" text-anchor="middle" class="panel-sub">Agent claims</text>
  <text x="435" y="397" text-anchor="middle" class="panel-sub">roles, tenant, trust</text>

  <rect x="525" y="330" width="150" height="78" rx="16" fill="#0891b2" filter="url(#shadow)"/>
  <text x="600" y="358" text-anchor="middle" class="panel-text">Policy router</text>
  <text x="600" y="380" text-anchor="middle" class="panel-sub">tool -&gt; domain</text>
  <text x="600" y="397" text-anchor="middle" class="panel-sub">RBAC + routing</text>

  <rect x="690" y="330" width="140" height="78" rx="16" fill="#2563eb" filter="url(#shadow)"/>
  <text x="760" y="358" text-anchor="middle" class="panel-text">Audit + traces</text>
  <text x="760" y="380" text-anchor="middle" class="panel-sub">Decisions, trace IDs,</text>
  <text x="760" y="397" text-anchor="middle" class="panel-sub">forensics</text>

  <rect x="360" y="438" width="150" height="92" rx="16" fill="#0ea5e9" filter="url(#shadow)"/>
  <text x="435" y="466" text-anchor="middle" class="panel-text">OPA / Rego</text>
  <text x="435" y="489" text-anchor="middle" class="panel-sub">Deterministic policy</text>
  <text x="435" y="506" text-anchor="middle" class="panel-sub">allow / deny / escalate</text>

  <rect x="525" y="438" width="150" height="92" rx="16" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="600" y="466" text-anchor="middle" class="panel-text">Approvals</text>
  <text x="600" y="489" text-anchor="middle" class="panel-sub">Human review for</text>
  <text x="600" y="506" text-anchor="middle" class="panel-sub">high-risk actions</text>

  <rect x="690" y="438" width="140" height="92" rx="16" fill="#10b981" filter="url(#shadow)"/>
  <text x="760" y="466" text-anchor="middle" class="panel-text">Dashboard</text>
  <text x="760" y="489" text-anchor="middle" class="panel-sub">Registry, approvals,</text>
  <text x="760" y="506" text-anchor="middle" class="panel-sub">policies, visibility</text>

  <rect x="360" y="562" width="470" height="54" rx="16" fill="#111827" stroke="#475569"/>
  <text x="595" y="594" text-anchor="middle" class="chip">Execution only proceeds after ACP returns allow or approved escalate.</text>

  <rect x="920" y="130" width="240" height="520" rx="20" fill="url(#panel)" stroke="#334155"/>
  <text x="948" y="172" class="label">Execution Side</text>
  <text x="948" y="202" class="panel-title">Governed targets</text>

  <rect x="948" y="228" width="184" height="70" rx="14" fill="#334155" filter="url(#shadow)"/>
  <text x="1040" y="254" text-anchor="middle" class="panel-text">Tools and APIs</text>
  <text x="1040" y="276" text-anchor="middle" class="panel-sub">Payments, CRM, weather, ERP</text>

  <rect x="948" y="320" width="184" height="70" rx="14" fill="#334155" filter="url(#shadow)"/>
  <text x="1040" y="346" text-anchor="middle" class="panel-text">MCP servers</text>
  <text x="1040" y="368" text-anchor="middle" class="panel-sub">Governed protocol access</text>

  <rect x="948" y="412" width="184" height="70" rx="14" fill="#334155" filter="url(#shadow)"/>
  <text x="1040" y="438" text-anchor="middle" class="panel-text">Other agents</text>
  <text x="1040" y="460" text-anchor="middle" class="panel-sub">A2A governance path</text>

  <rect x="948" y="504" width="184" height="70" rx="14" fill="#334155" filter="url(#shadow)"/>
  <text x="1040" y="530" text-anchor="middle" class="panel-text">Data systems</text>
  <text x="1040" y="552" text-anchor="middle" class="panel-sub">Databases, files, services</text>

  <path d="M252 470 C290 470, 305 265, 360 265" stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M580 264 L610 264" stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M720 300 L720 318" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrowMuted)"/>
  <path d="M680 370 C700 370, 708 370, 720 370" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrowMuted)"/>
  <path d="M600 408 L600 430" stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M435 408 L435 430" stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M760 408 L760 430" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrowMuted)"/>
  <path d="M830 264 C890 264, 900 264, 948 264" stroke="#60a5fa" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M675 484 C760 484, 840 346, 948 346" stroke="#fbbf24" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M830 484 C870 484, 900 438, 948 438" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrowMuted)"/>

  <text x="842" y="246" class="small">allow</text>
  <text x="790" y="340" class="small">decision events</text>
  <text x="775" y="458" class="small">registry + UI</text>
  <text x="760" y="326" class="small">policy input</text>
  <text x="690" y="472" class="small">escalate</text>
</svg>
