<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="ACP AI Control Plane architecture diagram">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 26px system-ui, sans-serif; fill: #111827; }
      .subtitle { font: 400 14px system-ui, sans-serif; fill: #475569; }
      .label { font: 700 12px system-ui, sans-serif; fill: #475569; letter-spacing: 0.08em; }
      .box-title { font: 700 15px system-ui, sans-serif; fill: #111827; }
      .box-text { font: 400 12px system-ui, sans-serif; fill: #374151; }
      .note { font: 400 12px system-ui, sans-serif; fill: #4b5563; }
      .boundary { fill: none; stroke: #94a3b8; stroke-width: 1.5; stroke-dasharray: 8 6; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 10; }
      .line { fill: none; stroke: #475569; stroke-width: 1.5; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="620" fill="#ffffff"/>

  <text x="50" y="48" class="title">ACP - AI Control Plane</text>
  <text x="50" y="72" class="subtitle">Deterministic governance between agent runtimes and governed execution targets.</text>

  <text x="70" y="118" class="label">AGENT SIDE</text>
  <rect class="box" x="50" y="130" width="220" height="110"/>
  <text x="160" y="162" text-anchor="middle" class="box-title">Agent runtimes</text>
  <text x="160" y="188" text-anchor="middle" class="box-text">CrewAI, LangGraph, Strands,</text>
  <text x="160" y="206" text-anchor="middle" class="box-text">Google ADK, MCP clients,</text>
  <text x="160" y="224" text-anchor="middle" class="box-text">custom Python workflows</text>

  <rect class="boundary" x="320" y="102" width="560" height="420"/>
  <text x="340" y="118" class="label">ACP RUNTIME</text>

  <rect class="box" x="360" y="140" width="200" height="78"/>
  <text x="460" y="170" text-anchor="middle" class="box-title">ACP SDK</text>
  <text x="460" y="192" text-anchor="middle" class="box-text">@governed_tool, client,</text>
  <text x="460" y="210" text-anchor="middle" class="box-text">local integration</text>

  <rect class="box" x="640" y="140" width="200" height="78"/>
  <text x="740" y="170" text-anchor="middle" class="box-title">Interceptor / Gateway</text>
  <text x="740" y="192" text-anchor="middle" class="box-text">PEP for tool, API,</text>
  <text x="740" y="210" text-anchor="middle" class="box-text">and agent calls</text>

  <rect class="box" x="360" y="272" width="140" height="76"/>
  <text x="430" y="302" text-anchor="middle" class="box-title">JWT identity</text>
  <text x="430" y="324" text-anchor="middle" class="box-text">claims, roles,</text>
  <text x="430" y="342" text-anchor="middle" class="box-text">agent trust</text>

  <rect class="box" x="530" y="272" width="140" height="76"/>
  <text x="600" y="302" text-anchor="middle" class="box-title">Policy router</text>
  <text x="600" y="324" text-anchor="middle" class="box-text">RBAC</text>
  <text x="600" y="342" text-anchor="middle" class="box-text">tool -> domain</text>

  <rect class="box" x="700" y="272" width="140" height="76"/>
  <text x="770" y="302" text-anchor="middle" class="box-title">Audit / traces</text>
  <text x="770" y="324" text-anchor="middle" class="box-text">decisions, trace IDs,</text>
  <text x="770" y="342" text-anchor="middle" class="box-text">forensics</text>

  <rect class="box" x="360" y="396" width="140" height="76"/>
  <text x="430" y="426" text-anchor="middle" class="box-title">OPA / Rego</text>
  <text x="430" y="448" text-anchor="middle" class="box-text">allow</text>
  <text x="430" y="466" text-anchor="middle" class="box-text">deny / escalate</text>

  <rect class="box" x="530" y="396" width="140" height="76"/>
  <text x="600" y="426" text-anchor="middle" class="box-title">Approvals</text>
  <text x="600" y="448" text-anchor="middle" class="box-text">human review</text>
  <text x="600" y="466" text-anchor="middle" class="box-text">for risky actions</text>

  <rect class="box" x="700" y="396" width="140" height="76"/>
  <text x="770" y="426" text-anchor="middle" class="box-title">Dashboard</text>
  <text x="770" y="448" text-anchor="middle" class="box-text">registry, policies,</text>
  <text x="770" y="466" text-anchor="middle" class="box-text">approvals, visibility</text>

  <text x="930" y="118" class="label">EXECUTION SIDE</text>
  <rect class="box" x="910" y="130" width="240" height="110"/>
  <text x="1030" y="162" text-anchor="middle" class="box-title">Governed targets</text>
  <text x="1030" y="188" text-anchor="middle" class="box-text">tools and APIs</text>
  <text x="1030" y="206" text-anchor="middle" class="box-text">MCP servers</text>
  <text x="1030" y="224" text-anchor="middle" class="box-text">other agents and data systems</text>

  <path class="line" d="M270 185 L360 185"/>
  <path class="line" d="M560 179 L640 179"/>
  <path class="line" d="M740 218 L740 252"/>
  <path class="line" d="M740 348 L740 396"/>
  <path class="line" d="M500 310 L530 310"/>
  <path class="line" d="M430 348 L430 396"/>
  <path class="line" d="M840 179 L910 179"/>
  <path class="line" d="M670 434 L700 434"/>

  <text x="54" y="566" class="note">Execution reaches governed targets only after ACP returns allow or an approved escalation.</text>
</svg>
