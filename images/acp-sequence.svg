<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 760" role="img" aria-label="ACP AI Control Plane governed request sequence">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 26px system-ui, sans-serif; fill: #111827; }
      .subtitle { font: 400 14px system-ui, sans-serif; fill: #475569; }
      .actor { font: 700 14px system-ui, sans-serif; fill: #111827; }
      .actor-sub { font: 400 12px system-ui, sans-serif; fill: #4b5563; }
      .step { font: 400 12px system-ui, sans-serif; fill: #374151; }
      .section { font: 700 12px system-ui, sans-serif; fill: #4b5563; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="1320" height="760" fill="#ffffff"/>

  <text x="48" y="46" class="title">Governed request sequence</text>
  <text x="48" y="70" class="subtitle">Simple request flow for allow, escalate, and deny outcomes.</text>

  <rect x="50" y="100" width="150" height="56" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="125" y="124" text-anchor="middle" class="actor">Agent runtime</text>
  <text x="125" y="144" text-anchor="middle" class="actor-sub">framework or app</text>

  <rect x="235" y="100" width="150" height="56" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="310" y="124" text-anchor="middle" class="actor">ACP SDK</text>
  <text x="310" y="144" text-anchor="middle" class="actor-sub">decorator / client</text>

  <rect x="430" y="100" width="160" height="56" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="510" y="124" text-anchor="middle" class="actor">Interceptor</text>
  <text x="510" y="144" text-anchor="middle" class="actor-sub">gateway / PEP</text>

  <rect x="640" y="100" width="150" height="56" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="715" y="124" text-anchor="middle" class="actor">JWT identity</text>
  <text x="715" y="144" text-anchor="middle" class="actor-sub">principal + roles</text>

  <rect x="835" y="100" width="150" height="56" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="910" y="124" text-anchor="middle" class="actor">OPA / Rego</text>
  <text x="910" y="144" text-anchor="middle" class="actor-sub">policy decision</text>

  <rect x="1030" y="100" width="170" height="56" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="1115" y="124" text-anchor="middle" class="actor">Dashboard / approvals</text>
  <text x="1115" y="144" text-anchor="middle" class="actor-sub">review and visibility</text>

  <rect x="1235" y="100" width="70" height="56" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
  <text x="1270" y="124" text-anchor="middle" class="actor">Tool</text>
  <text x="1270" y="144" text-anchor="middle" class="actor-sub">API</text>

  <path d="M125 156 L125 720" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="7 6"/>
  <path d="M310 156 L310 720" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="7 6"/>
  <path d="M510 156 L510 720" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="7 6"/>
  <path d="M715 156 L715 720" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="7 6"/>
  <path d="M910 156 L910 720" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="7 6"/>
  <path d="M1115 156 L1115 720" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="7 6"/>
  <path d="M1270 156 L1270 720" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="7 6"/>

  <text x="48" y="192" class="section">SHARED PATH</text>

  <path d="M125 220 L310 220" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="145" y="212" class="step">1. call governed function</text>

  <path d="M310 260 L510 260" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="332" y="252" class="step">2. POST /tool-call</text>

  <path d="M510 300 L715 300" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="534" y="292" class="step">3. validate token and claims</text>

  <path d="M715 340 L510 340" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="532" y="332" class="step">4. principal and roles</text>

  <path d="M510 380 L910 380" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="536" y="372" class="step">5. evaluate policy input</text>

  <path d="M910 420 L510 420" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="536" y="412" class="step">6. decision = allow / deny / escalate</text>

  <path d="M510 460 L1115 460" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="536" y="452" class="step">7. record audit, trace, registry, approvals</text>

  <path d="M40 500 L1280 500" stroke="#cbd5e1" stroke-width="1"/>
  <text x="48" y="492" class="section">ALLOW</text>

  <path d="M510 530 L310 530" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="334" y="522" class="step">8a. allow + trace_id</text>

  <path d="M310 570 L1270 570" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="334" y="562" class="step">9a. execute governed tool or API call</text>

  <path d="M40 610 L1280 610" stroke="#cbd5e1" stroke-width="1"/>
  <text x="48" y="602" class="section">ESCALATE</text>

  <path d="M510 640 L310 640" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="334" y="632" class="step">8b. escalate + trace_id</text>

  <path d="M510 680 L1115 680" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="536" y="672" class="step">9b. approval request appears in dashboard</text>

  <path d="M1115 720 L310 720" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="536" y="712" class="step">10b. retry after approval, or stop on denial</text>

  <text x="980" y="602" class="section">DENY</text>
  <path d="M510 600 L310 600" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="736" y="592" class="step">8c. deny and block execution</text>
</svg>
