<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 900" role="img" aria-label="ACP AI Control Plane governed request sequence">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#34d399"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f87171"/>
    </marker>
    <style>
      .title { font: 700 28px system-ui, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 15px system-ui, sans-serif; fill: #cbd5e1; }
      .actor { font: 700 14px system-ui, sans-serif; fill: #e2e8f0; }
      .actor-sub { font: 400 12px system-ui, sans-serif; fill: #bfdbfe; }
      .step { font: 500 12px system-ui, sans-serif; fill: #e2e8f0; }
      .label { font: 700 13px system-ui, sans-serif; fill: #f8fafc; }
      .section { font: 700 12px system-ui, sans-serif; fill: #93c5fd; letter-spacing: 0.08em; text-transform: uppercase; }
      .note { font: 400 12px system-ui, sans-serif; fill: #cbd5e1; }
    </style>
  </defs>

  <rect width="1320" height="900" rx="24" fill="url(#bg)"/>

  <text x="56" y="60" class="title">Governed request sequence</text>
  <text x="56" y="88" class="subtitle">Example flow for a governed tool call with allow, escalate, and deny outcomes.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="120" width="150" height="62" rx="14" fill="#1d4ed8"/>
    <text x="135" y="146" text-anchor="middle" class="actor">Agent runtime</text>
    <text x="135" y="168" text-anchor="middle" class="actor-sub">CrewAI / LangGraph / custom app</text>

    <rect x="250" y="120" width="150" height="62" rx="14" fill="#4f46e5"/>
    <text x="325" y="146" text-anchor="middle" class="actor">ACP SDK</text>
    <text x="325" y="168" text-anchor="middle" class="actor-sub">Decorator / client</text>

    <rect x="440" y="120" width="160" height="62" rx="14" fill="#7c3aed"/>
    <text x="520" y="146" text-anchor="middle" class="actor">Interceptor</text>
    <text x="520" y="168" text-anchor="middle" class="actor-sub">Gateway / PEP</text>

    <rect x="640" y="120" width="150" height="62" rx="14" fill="#0f766e"/>
    <text x="715" y="146" text-anchor="middle" class="actor">JWT / identity</text>
    <text x="715" y="168" text-anchor="middle" class="actor-sub">Principal + roles</text>

    <rect x="830" y="120" width="150" height="62" rx="14" fill="#0891b2"/>
    <text x="905" y="146" text-anchor="middle" class="actor">OPA / Rego</text>
    <text x="905" y="168" text-anchor="middle" class="actor-sub">Policy decision</text>

    <rect x="1020" y="120" width="170" height="62" rx="14" fill="#f59e0b"/>
    <text x="1105" y="146" text-anchor="middle" class="actor">Dashboard / approvals</text>
    <text x="1105" y="168" text-anchor="middle" class="actor-sub">Visibility + human review</text>

    <rect x="1210" y="120" width="70" height="62" rx="14" fill="#334155"/>
    <text x="1245" y="146" text-anchor="middle" class="actor">Tool</text>
    <text x="1245" y="168" text-anchor="middle" class="actor-sub">API</text>
  </g>

  <path d="M135 182 L135 840" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>
  <path d="M325 182 L325 840" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>
  <path d="M520 182 L520 840" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>
  <path d="M715 182 L715 840" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>
  <path d="M905 182 L905 840" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>
  <path d="M1105 182 L1105 840" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>
  <path d="M1245 182 L1245 840" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>

  <text x="60" y="224" class="section">Shared path</text>

  <path d="M135 250 L325 250" stroke="#60a5fa" stroke-width="3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="160" y="242" class="step">1. Call governed function / tool</text>

  <path d="M325 290 L520 290" stroke="#60a5fa" stroke-width="3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="350" y="282" class="step">2. POST /tool-call with agent_id, tool, action, args</text>

  <path d="M520 330 L715 330" stroke="#60a5fa" stroke-width="3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="542" y="322" class="step">3. Validate bearer token, trace ID, and principal claims</text>

  <path d="M715 370 L520 370" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="535" y="362" class="step">4. Return principal, roles, and agent identity</text>

  <path d="M520 410 L905 410" stroke="#60a5fa" stroke-width="3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="550" y="402" class="step">5. Send normalized policy input to OPA (tool, action, risk, principal)</text>

  <path d="M905 450 L520 450" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="548" y="442" class="step">6. Decision = allow, deny, or escalate</text>

  <path d="M520 490 L1105 490" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="550" y="482" class="step">7. Record trace, audit event, registry activity, and approval state</text>

  <rect x="52" y="530" width="1216" height="120" rx="18" fill="#052e16" stroke="#166534"/>
  <text x="78" y="558" class="label">Allow path</text>
  <path d="M520 580 L325 580" stroke="#34d399" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="345" y="572" class="step">8a. Return allow + trace_id</text>
  <path d="M325 620 L1245 620" stroke="#34d399" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="355" y="612" class="step">9a. SDK executes the real tool / API call only after ACP allows it</text>
  <path d="M1245 642 L135 642" stroke="#34d399" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="700" y="666" text-anchor="middle" class="note">Result returns to the agent after governed execution completes.</text>

  <rect x="52" y="670" width="1216" height="110" rx="18" fill="#451a03" stroke="#b45309"/>
  <text x="78" y="698" class="label">Escalate path</text>
  <path d="M520 720 L325 720" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrowAmber)"/>
  <text x="345" y="712" class="step">8b. Return escalate + trace_id</text>
  <path d="M520 748 L1105 748" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrowAmber)"/>
  <text x="550" y="740" class="step">9b. Dashboard shows approval request; reviewer approves or denies</text>
  <path d="M1105 776 L325 776" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrowAmber)"/>
  <text x="550" y="798" class="step">10b. SDK polls /approvals or retries with same trace_id, then executes only after approval</text>

  <rect x="52" y="800" width="1216" height="64" rx="18" fill="#3f0d14" stroke="#b91c1c"/>
  <text x="78" y="828" class="label">Deny path</text>
  <path d="M520 842 L325 842" stroke="#f87171" stroke-width="3" fill="none" marker-end="url(#arrowRed)"/>
  <text x="345" y="834" class="step">8c. Return deny; SDK raises and blocks the execution before the target is called</text>
</svg>
